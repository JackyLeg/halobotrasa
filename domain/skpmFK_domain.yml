version: '3.1'
intents:
- skpmFK_menu
- prosedur_skpmFK
- persyaratan_skpmFK
- transaksi_skpmFK
- hasil_skpmFK
- status_skpmFK
slots:
  menu_skpmFK:
    type: categorical
    values:
    - Prosedur SKPM FK
    - Persyaratan SKPM FK
    - Transaksi SKPM FK
    - Hasil SKPM FK
    mappings:
    - type: custom
    influence_conversation: false
  menu_skpmFK_confirmation:
    type: bool
    mappings:
    - type: custom
    influence_conversation: false
responses:
  utter_ask_menu_skpmFK:
  - text: 'Please select one of the following SKPM FK options:'
    buttons:
    - title: Prosedur SKPM FK
      payload: /prosedur_skpmFK
    - title: Persyaratan SKPM FK
      payload: /persyaratan_skpmFK
    - title: Transaksi SKPM FK
      payload: /transaksi_skpmFK
    - title: Hasil SKPM FK
      payload: /hasil_skpmFK
  utter_ask_menu_skpmFK_confirmation:
  - text: 'You have selected the option: {menu_skpmFK}. Is that correct?'
    buttons:
    - title: 'Yes'
      payload: /affirm
    - title: 'No'
      payload: /deny
  utter_menu_skpmFK_cancelled:
  - text: Okay, let's try again. Please select one of the SKPM FK options.
  utter_menu_skpmFK_ok:
  - text: 'You have successfully selected the SKPM FK option: {menu_skpmFK}.'
  utter_answer_prosedur_skpmFK:
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Hukum
    text: 'PROSEDUR PENGISIAN SKPM-FK (FH)

      '
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Ekonomi dan Bisnis
    text: 'PROSEDUR PENGISIAN SKPM-FK (FEB)

      '
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Kedokteran
    text: 'PROSEDUR PENGISIAN SKPM-FK (FK)

      '
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Kedokteran Gigi
    text: 'PROSEDUR PENGISIAN SKPM-FK (FKG)

      '
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Teknik Sipil dan Perencanaan
    text: 'PROSEDUR PENGISIAN SKPM-FK (FTSP)

      '
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Teknologi Industri
    text: 'PROSEDUR PENGISIAN SKPM-FK (FTI)

      '
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Teknologi Kebumian dan Energi
    text: 'PROSEDUR PENGISIAN SKPM-FK (FTKE)

      '
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Arsitektur Lanskap dan Teknologi Lingkungan
    text: 'PROSEDUR PENGISIAN SKPM-FK (FALTL)

      '
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Seni Rupa dan Desain
    text: 'PROSEDUR PENGISIAN SKPM-FK (FSRD)

      '
  - text: "Pengajuan SKPM-FK dilakukan melalui tahapan berikut:\n  1. Mahasiswa melengkapi\
      \ data dan dokumen pendukung SKPM-FK.\n  2. Program Studi/Fakultas melakukan\
      \ verifikasi data SKPM-FK.\n  3. SKPM-FK ditetapkan dan dapat diakses oleh mahasiswa.\n"
  utter_answer_persyaratan_skpmFK:
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Hukum
    text: 'PERSYARATAN PENGISIAN SKPM-FK (FH)

      '
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Ekonomi dan Bisnis
    text: 'PERSYARATAN PENGISIAN SKPM-FK (FEB)

      '
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Kedokteran
    text: 'PERSYARATAN PENGISIAN SKPM-FK (FK)

      '
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Kedokteran Gigi
    text: 'PERSYARATAN PENGISIAN SKPM-FK (FKG)

      '
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Teknik Sipil dan Perencanaan
    text: 'PERSYARATAN PENGISIAN SKPM-FK (FTSP)

      '
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Teknologi Industri
    text: 'PERSYARATAN PENGISIAN SKPM-FK (FTI)

      '
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Teknologi Kebumian dan Energi
    text: 'PERSYARATAN PENGISIAN SKPM-FK (FTKE)

      '
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Arsitektur Lanskap dan Teknologi Lingkungan
    text: 'PERSYARATAN PENGISIAN SKPM-FK (FALTL)

      '
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Seni Rupa dan Desain
    text: 'PERSYARATAN PENGISIAN SKPM-FK (FSRD)

      '
  - text: 'Persyaratan pengisian SKPM-FK yang harus dipenuhi mahasiswa adalah:

      - Status Mahasiswa Aktif

      - Data kegiatan pendukung (organisasi, prestasi, sertifikasi) tersedia

      '
  utter_answer_transaksi_skpmFK:
  - text: Silakan lengkapi dan ajukan data SKPM-FK sesuai dengan kegiatan yang telah
      anda ikuti.
  utter_answer_hasil_skpmFK:
  - text: 'Pengajuan SKPM-FK anda sedang diproses.

      Anda dapat melihat status dan hasil SKPM-FK melalui sistem.

      '
  utter_answer_error_skpmFK:
  - text: Maaf, menu tidak ditemukan.
actions:
- action_answer_skpmFK
- action_ask_confirmation_skpmFK
- action_deny_skpmFK
