      '
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Seni Rupa dan Desain
    text: 'PROSEDUR TUGAS AKHIR (FSRD)

      '
  - text: 'PROSEDUR TUGAS AKHIR

