version: '3.1'
intents:
- tugasAkhir_menu
- prosedur_tugasAkhir
- persyaratan_tugasAkhir
- transaksi_tugasAkhir
- hasil_tugasAkhir
- status_tugasAkhir
slots:
  menu_tugasAkhir:
    type: categorical
    values:
    - Prosedur Tugas Akhir
    - Persyaratan Tugas Akhir
    - Transaksi Tugas Akhir
    - Hasil Tugas Akhir
    mappings:
    - type: custom
    influence_conversation: false
  menu_tugasAkhir_confirmation:
    type: bool
    mappings:
    - type: custom
    influence_conversation: false
responses:
  utter_ask_menu_tugasAkhir:
  - text: 'Please select one of the following tugas akhir options:'
    buttons:
    - title: Prosedur Tugas Akhir
      payload: /prosedur_tugasAkhir
    - title: Persyaratan Tugas Akhir
      payload: /persyaratan_tugasAkhir
    - title: Transaksi Tugas Akhir
      payload: /transaksi_tugasAkhir
    - title: Hasil Tugas Akhir
      payload: /hasil_tugasAkhir
  utter_ask_menu_tugasAkhir_confirmation:
  - text: 'You have selected the option: {menu_tugasAkhir}. Is that correct?'
    buttons:
    - title: 'Yes'
      payload: /affirm
    - title: 'No'
      payload: /deny
  utter_menu_tugasAkhir_cancelled:
  - text: Okay, let's try again. Please select one of the tugas akhir options.
  utter_menu_tugasAkhir_ok:
  - text: 'You have successfully selected the tugas akhir option: {menu_tugasAkhir}.'
  utter_answer_prosedur_tugasAkhir:
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Hukum
    text: 'PROSEDUR TUGAS AKHIR (FH)

      '
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Ekonomi dan Bisnis
    text: 'PROSEDUR TUGAS AKHIR (FEB)

      '
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Kedokteran
    text: 'PROSEDUR TUGAS AKHIR (FK)

      '
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Kedokteran Gigi
    text: 'PROSEDUR TUGAS AKHIR (FKG)

      '
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Teknik Sipil dan Perencanaan
    text: 'PROSEDUR TUGAS AKHIR (FTSP)

      '
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Teknologi Industri
