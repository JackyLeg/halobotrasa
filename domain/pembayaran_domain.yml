version: '3.1'
intents:
- pembayaran_menu
- prosedur_pembayaran
- persyaratan_pembayaran
- transaksi_pembayaran
- hasil_pembayaran
- status_pembayaran
slots:
  menu_pembayaran:
    type: categorical
    values:
    - Prosedur Pembayaran
    - Persyaratan Pembayaran
    - Transaksi Pembayaran
    - Hasil Pembayaran
    mappings:
    - type: custom
    influence_conversation: false
  menu_pembayaran_confirmation:
    type: bool
    mappings:
    - type: custom
    influence_conversation: false
responses:
  utter_ask_menu_pembayaran:
  - text: 'Please select one of the following pembayaran options:'
    buttons:
    - title: Prosedur Pembayaran
      payload: /prosedur_pembayaran
    - title: Persyaratan Pembayaran
      payload: /persyaratan_pembayaran
    - title: Transaksi Pembayaran
      payload: /transaksi_pembayaran
    - title: Status Pembayaran
      payload: /status_pembayaran
  utter_ask_menu_pembayaran_confirmation:
  - text: 'You have selected the option: {menu_pembayaran}. Is that correct?'
    buttons:
    - title: 'Yes'
      payload: /affirm
    - title: 'No'
      payload: /deny
  utter_menu_pembayaran_cancelled:
  - text: Okay, let's try again. Please select one of the pembayaran options.
  utter_menu_pembayaran_ok:
  - text: 'You have successfully selected the pembayaran option: {menu_pembayaran}.'
  utter_answer_prosedur_pembayaran:
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Hukum
    text: 'PROSEDUR PEMBAYARAN (FH)

      '
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Ekonomi dan Bisnis
    text: 'PROSEDUR PEMBAYARAN (FEB)

      '
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Kedokteran
    text: 'PROSEDUR PEMBAYARAN (FK)

      '
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Kedokteran Gigi
    text: 'PROSEDUR PEMBAYARAN (FKG)

      '
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Teknik Sipil dan Perencanaan
    text: 'PROSEDUR PEMBAYARAN (FTSP)

      '
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Teknologi Industri
    text: 'PROSEDUR PEMBAYARAN (FTI)

      '
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Teknologi Kebumian dan Energi
    text: 'PROSEDUR PEMBAYARAN (FTKE)

      '
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Arsitektur Lanskap dan Teknologi Lingkungan
    text: 'PROSEDUR PEMBAYARAN (FALTL)

      '
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Seni Rupa dan Desain
    text: 'PROSEDUR PEMBAYARAN (FSRD)

      '
  - text: "PROSEDUR PEMBAYARAN\nPembayaran dilakukan menggunakan sistem Virtual Account\
      \ (VA) Bank BNI yang dapat diakses melalui portal mahasiswa. Berikut langkah-langkahnya:\n\
      1. Login Portal: Akses laman student.trisakti.ac.id.\n2. Cek Tagihan: Pilih\
      \ menu Status Keuangan. Di sini terdapat tiga tab utama:\n  - Account Statement:\
      \ Untuk melihat riwayat transaksi.\n  - Invoice: Berisi rincian tagihan aktif\
      \ dan nomor Virtual Account.\n  - Payment: Informasi pembayaran yang telah diverifikasi.\n\
      3. Generate Tagihan: Klik tombol Hitung Single VA untuk memunculkan total tagihan\
      \ yang harus dibayarkan.\n4. Pembayaran: Gunakan nomor Virtual Account yang\
      \ tertera untuk membayar melalui ATM, Teller, atau Mobile Banking BNI.\n"
  utter_answer_persyaratan_pembayaran:
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Hukum
    text: 'PERSYARATAN PEMBAYARAN (FH)

      '
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Ekonomi dan Bisnis
    text: 'PERSYARATAN PEMBAYARAN (FEB)

      '
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Kedokteran
    text: 'PERSYARATAN PEMBAYARAN (FK)

      '
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Kedokteran Gigi
    text: 'PERSYARATAN PEMBAYARAN (FKG)

      '
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Teknik Sipil dan Perencanaan
    text: 'PERSYARATAN PEMBAYARAN (FTSP)

      '
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Teknologi Industri
    text: 'PERSYARATAN PEMBAYARAN (FTI)

      '
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Teknologi Kebumian dan Energi
    text: 'PERSYARATAN PEMBAYARAN (FTKE)

      '
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Arsitektur Lanskap dan Teknologi Lingkungan
    text: 'PERSYARATAN PEMBAYARAN (FALTL)

      '
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Seni Rupa dan Desain
    text: 'PERSYARATAN PEMBAYARAN (FSRD)

      '
  - text: 'PERSYARATAN PEMBAYARAN

      - Identitas Pembayaran: Mahasiswa wajib memiliki Nomor Induk Mahasiswa (NIM)
      aktif.

      - Kode Virtual Account: Format pembayaran menggunakan kode 8741 + NIM (Contoh:
      8741060002xxxx).

      - Verifikasi Data: Pastikan nominal yang muncul pada layar ATM/Aplikasi perbankan
      sesuai dengan jumlah yang tertera di tab Invoice portal mahasiswa.

      - Metode Transaksi: Pembayaran hanya dianggap sah jika dilakukan melalui saluran
      resmi yang terintegrasi dengan sistem Virtual Account Bank BNI.

      '
  utter_answer_transaksi_pembayaran:
  - text: Silakan lakukan pembayaran sesuai nominal dan metode yang tersedia.
  utter_answer_status_pembayaran:
  - text: 'Pembayaran kamu berhasil diproses.

      Status keuangan kamu telah diperbarui.

      '
  utter_answer_error_pembayaran:
  - text: Maaf, menu tidak ditemukan.
actions:
- action_answer_pembayaran
- action_ask_confirmation_pembayaran
- action_deny_pembayaran
