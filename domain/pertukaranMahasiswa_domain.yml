      name: fakultas
      value: Fakultas Seni Rupa dan Desain
    text: 'PERSYARATAN PERTUKARAN MAHASISWA (FSRD)

      '
  - text: 'PERSYARATAN PERTUKARAN MAHASISWA

      '
  utter_answer_transaksi_pertukaranMahasiswa:
  - text: Silakan lengkapi data pengajuan pertukaran mahasiswa dan ajukan permohonan
      pertukaran mahasiswa.
  utter_answer_hasil_pertukaranMahasiswa:
  - text: Pengajuan pertukaran mahasiswa kamu telah diproses.
  utter_answer_error_pertukaranMahasiswa:
  - text: Maaf, menu tidak ditemukan. Silakan pilih opsi yang tersedia.
actions:
- action_answer_pertukaranMahasiswa
- action_ask_confirmation_pertukaranMahasiswa
- action_deny_pertukaranMahasiswa
