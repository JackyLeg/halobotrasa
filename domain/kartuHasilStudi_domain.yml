  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Arsitektur Lanskap dan Teknologi Lingkungan
    text: 'PROSEDUR MENGAKSES KARTU HASIL STUDI (KHS) (FALTL)

      '
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Seni Rupa dan Desain
    text: 'PROSEDUR MENGAKSES KARTU HASIL STUDI (KHS) (FSRD)

      '
  - text: "PROSEDUR MENGAKSES KARTU HASIL STUDI (KHS)\n  1. Penerbitan: KHS diterbitkan\
      \ secara resmi oleh Universitas pada setiap akhir semester setelah masa penilaian\
      \ dosen berakhir.\n  2. Akses Mahasiswa: Anda dapat melihat dan mengunduh KHS\
      \ secara mandiri melalui portal student.trisakti.ac.id.\n  3. Pemantauan: Dosen\
      \ Wali Anda juga akan menerima salinan KHS melalui sistem sis.trisakti.ac.id\
      \ untuk kepentingan evaluasi akademik dan bimbingan semester berikutnya.\n \
      \ -------\n  4. Melihat Kartu Hasil Studi (KHS) & Transkrip Nilai melalui laman\
      \ https://student.trisakti.ac.id/:\n    a. Mahasiswa mengakses laman https://student.trisakti.ac.id/\n\
      \    b. Pilih menu Examination Result, pada menu ini terdapat empat tab yaitu\
      \ :\n      1) Coursework, dapat dilihat detail atau rincian dari nilai matakuliah\n\
      \      2) Kartu Hasil Studi, menampilkan nilai yang diperoleh tiap semester\n\
      \      3) Passed Transcript, menampilkan nilai yang lulus saja\n      4) All\
      \ Transcript, menampilkan seluruh nilai yang sudah ditempuh. Baik KHS maupun\
      \ transkrip dapat diunduh dalam format pdf\n      \n"
