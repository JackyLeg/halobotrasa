  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Seni Rupa dan Desain
    text: 'PERSYARATAN MENGAKSES KARTU HASIL STUDI (KHS) (FSRD)

      '
  - text: "PERSYARATAN MENGAKSES KARTU HASIL STUDI (KHS)\n  Agar KHS dapat diakses\
      \ dan diunduh, mahasiswa wajib memenuhi ketentuan berikut:\n  - Penyelesaian\
      \ KRS: Telah melakukan pengisian KRS secara sah pada awal semester.\n  - Evaluasi\
      \ Perkuliahan: Mengikuti seluruh rangkaian evaluasi (UTS/UAS) dan memenuhi persyaratan\
      \ kehadiran minimal yang ditentukan.\n  - Administrasi Keuangan: Pastikan seluruh\
      \ kewajiban administrasi keuangan semester berjalan telah terselesaikan (sesuai\
      \ kebijakan Fakultas masing-masing untuk membuka akses nilai).\n  \n  *Catatan:\
      \ Jika nilai mata kuliah tertentu belum muncul, pastikan Anda telah mengisi\
      \ kuesioner evaluasi dosen (jika diwajibkan) atau silakan hubungi Sekretariat\
      \ Program Studi.\n  \n"
  utter_answer_hasil_kartuHasilStudi:
