      name: fakultas
      value: Fakultas Arsitektur Lanskap dan Teknologi Lingkungan
    text: 'PROSEDUR MB OUTBOUND NON PT (FALTL)

      '
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Seni Rupa dan Desain
    text: 'PROSEDUR MB OUTBOUND NON PT (FSRD)

      '
  - text: 'PROSEDUR MB OUTBOUND NON PT

      '
  utter_answer_persyaratan_MBOutboundNonPT:
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Hukum
    text: 'PERSYARATAN MB OUTBOUND NON PT (FH)

      '
  - condition:
    - type: slot
      name: fakultas
