      '
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Kedokteran Gigi
    text: 'PERSYARATAN MB OUTBOUND NON PT (FKG)

      '
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Teknik Sipil dan Perencanaan
    text: 'PERSYARATAN MB OUTBOUND NON PT (FTSP)

      '
  - condition:
    - type: slot
      name: fakultas
      value: Fakultas Teknologi Industri
