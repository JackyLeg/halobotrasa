  - text: "PERSYARATAN PENGISIAN KARTU RENCANA STUDI (KRS):\nUntuk dapat melakukan\
      \ pengisian Kartu Rencana Studi (KRS), mahasiswa wajib memenuhi persyaratan\
      \ administratif dan akademik sebagai berikut:\n1. Status Registrasi Administrasi\n\
      \  - Pembayaran BPP: Telah melunasi Biaya Penyelenggaraan Pendidikan (BPP) Pokok\
      \ untuk semester berjalan.\n  - Status Aktif: Terdaftar secara resmi di sistem\
      \ informasi universitas sebagai mahasiswa aktif.\n  - Persyaratan Khusus: Memenuhi\
      \ kewajiban administratif tambahan yang ditentukan oleh masing-masing Fakultas\
      \ (jika ada).\n2. Ketentuan Akademik\n  - Konsultasi Dosen Wali: Wajib melakukan\
      \ konsultasi rencana studi dengan Dosen Wali untuk menentukan beban SKS dan\
      \ mata kuliah yang akan diambil.\n  - Persetujuan (Approval): Mendapatkan izin/persetujuan\
      \ dari Dosen Wali melalui Sistem Informasi Akademik untuk membuka akses pengisian.\n\
      \  - Jadwal Kalender Akademik: Pengisian hanya dapat dilakukan dalam periode\
      \ yang telah ditetapkan dalam Kalender Akademik Universitas Trisakti.\n3. Ketentuan\
      \ Khusus Mahasiswa Baru\n  - Mahasiswa baru jalur reguler tidak perlu melakukan\
      \ pengisian mandiri pada semester pertama, karena KRS akan terisi secara otomatis\
      \ dengan paket perkuliahan semester I.\n  - Mahasiswa jalur Pindahan, Transfer\
      \ Kredit, atau RPL tetap wajib mengikuti prosedur pengisian mandiri.\n\n*Catatan:\
      \ Pastikan Anda telah menyelesaikan pembayaran BPP tepat waktu agar sinkronisasi\
      \ status pada portal student.trisakti.ac.id tidak terhambat.\n"
