      value: Fakultas Seni Rupa dan Desain
    text: 'PROSEDUR KRS (FSRD)

      '
  - text: "PROSEDUR PENGISIAN KARTU RENCANA STUDI (KRS):\nKRS wajib diisi oleh mahasiswa\
      \ setiap awal semester melalui portal student.trisakti.ac.id untuk mendapatkan\
      \ hak mengikuti kegiatan akademik. Berikut adalah langkah-langkahnya:\n  1.\
      \ Tahap Pra-KRS (Registrasi Administrasi)\n    Sebelum mengisi KRS, Anda wajib\
      \ menyelesaikan registrasi administrasi:\n    - Mahasiswa Lama: Melakukan pembayaran\
      \ Biaya Penyelenggaraan Pendidikan (BPP) Pokok dan memenuhi persyaratan lain\
      \ yang ditetapkan Fakultas.\n    - Mahasiswa Baru: KRS Semester 1 akan terisi\
      \ secara otomatis (paket) setelah memperoleh NIM, kecuali bagi mahasiswa jalur\
      \ Pindahan/RPL.\n  2. Tahap Pengisian KRS (Registrasi Akademik)\n    Setelah\
      \ status administrasi aktif, ikuti alur berikut:\n    - Konsultasi: Menghubungi\
      \ Dosen Wali untuk merencanakan mata kuliah yang akan diambil.\n    - Persetujuan\
      \ Awal: Dosen Wali memberikan izin akses pengisian KRS.\n    - Input Data: Mahasiswa\
      \ mengisi KRS secara mandiri pada Sistem Informasi Akademik sesuai jadwal kalender\
      \ akademik.\n    - Validasi Akhir: Dosen Wali memberikan persetujuan (approve)\
      \ KRS paling lambat pada hari terakhir masa pengisian.\n  3. Perubahan KRS (Batal\
      \ Tambah)\n    Jika terdapat perubahan mata kuliah, prosedur Batal Tambah wajib\
      \ diselesaikan paling lambat 7 hari kerja setelah masa pengisian KRS dimulai.\n\
      \  *Catatan: Pastikan Anda memantau jadwal pada Kalender Akademik agar tidak\
      \ melewati batas waktu pengisian, karena keterlambatan dapat berakibat pada\
      \ status akademik non-aktif.\n\n\nPROSEDUR PENGISIAN KRS MELALUI LAMAN https://student.trisakti.ac.id/\n\
      \  a. Mahasiswa mengakses laman https://student.trisakti.ac.id/\n  b. Klik menu\
      \ Register Course untuk mengisi Kartu Rencana Studi.\n  c. Pilih Semester dan\
      \ tahun akademik yang akan ditempuh, ada 2 jenis pengisian KRS yaitu:\n    1)\
      \ KRS Reguler, pilih semester dan tahun akademik dengan kode (R)\n    2) KRS\
      \ Remedial semester berjalan, pilih semester dan tahun akademik dengan kode\
      \ (Rmd)\nCatatan :\n  a. Sebelum mengisi KRS mahasiswa wajib melakukan proses\
      \ perwalian\n  b. Mahasiswa baru bisa mengisi KRS setelah Dosen Pembimbing Akademik/Dosen\
      \ Wali merespon permintaan perwalian.\n"
